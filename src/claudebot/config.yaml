# ClaudeDevBot Configuration

server:
  host: "localhost"
  port: 8765
  port_auto_increment: true
  api_key: null  # Set via CLAUDEBOT_API_KEY env var
  rate_limit: 60  # requests per minute

agents:
  enabled:
    - spec
    - code
    - test
    - deploy
    - debug
  timeout: 300

claude:
  model: "claude-3-5-sonnet-20241022"

git:
  auto_commit: false
  default_branch: "main"
