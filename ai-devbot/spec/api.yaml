openapi: 3.0.3
info:
  title: AI DevBot API
  description: Telegram Bot API for autonomous multi-agent development assistant
  version: 1.0.0

servers:
  - url: https://api.telegram.org
    description: Telegram Bot API

paths:
  /bot{token}/getMe:
    get:
      summary: Get bot information
      operationId: getMe
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bot information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /bot{token}/sendMessage:
    post:
      summary: Send a message
      operationId: sendMessage
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'

  /bot{token}/getUpdates:
    get:
      summary: Get updates
      operationId: getUpdates
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Update'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        is_bot:
          type: boolean
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        language_code:
          type: string

    Chat:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [private, group, supergroup, channel]
        title:
          type: string
        username:
          type: string

    Message:
      type: object
      properties:
        message_id:
          type: integer
        from:
          $ref: '#/components/schemas/User'
        chat:
          $ref: '#/components/schemas/Chat'
        date:
          type: integer
        text:
          type: string

    SendMessageRequest:
      type: object
      required:
        - chat_id
        - text
      properties:
        chat_id:
          type: integer
        text:
          type: string
        parse_mode:
          type: string
          enum: [Markdown, MarkdownV2, HTML]
        reply_markup:
          type: object

    Update:
      type: object
      properties:
        update_id:
          type: integer
        message:
          $ref: '#/components/schemas/Message'
        edited_message:
          type: object
        callback_query:
          type: object

  securitySchemes:
    BotToken:
      type: apiKey
      in: header
      name: X-Telegram-Bot-Api-Secret-Token
