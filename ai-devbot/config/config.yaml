# AI DevBot Configuration

# Telegram Bot Configuration
telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  api_id: "${TELEGRAM_API_ID}"
  api_hash: "${TELEGRAM_API_HASH}"
  allowed_users: []
  commands:
    - /spec
    - /code
    - /test
    - /deploy
    - /debug
    - /status

# Claude Code Configuration
claude:
  cli_path: "claude"
  model: "sonnet"
  max_tokens: 4096
  temperature: 0.7
  project_context: "ai-devbot"

# Agent Configuration
agents:
  spec_agent:
    model: "sonnet"
    max_iterations: 10
    timeout: 300
  code_agent:
    model: "sonnet"
    max_iterations: 20
    timeout: 600
  test_agent:
    model: "haiku"
    max_iterations: 15
    timeout: 300
  deploy_agent:
    model: "sonnet"
    max_iterations: 5
    timeout: 600
  debug_agent:
    model: "sonnet"
    max_iterations: 10
    timeout: 300

# Memory Configuration
memory:
  short_term:
    max_items: 100
    ttl_seconds: 3600
  long_term:
    persist_path: "data/memory/long_term"
    embeddings_enabled: true

# Observability Configuration
observability:
  logging:
    level: "INFO"
    format: "json"
    output: "stdout"
  tracing:
    enabled: true
    service_name: "ai-devbot"
    exporter: "console"
  metrics:
    enabled: true
    port: 9090

# Guardrails Configuration
guardrails:
  permissions:
    allowed_commands:
      - spec
      - code
      - test
      - deploy
      - debug
      - status
    blocked_patterns:
      - "rm -rf /"
      - "DROP DATABASE"
    max_file_size_mb: 10
  command_validation:
    max_length: 1000
    max_args: 20

# Workflow Configuration
workflow:
  max_concurrent_tasks: 5
  task_timeout_seconds: 600
  retry_attempts: 3
  retry_delay_seconds: 5

# Tools Configuration
tools:
  git:
    default_branch: "main"
    commit_message_prefix: "[AI-DevBot]"
  filesystem:
    allowed_directories:
      - "."
    max_file_operations: 50
